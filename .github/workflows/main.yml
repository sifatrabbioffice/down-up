name: RE4 Pak Auto Extractor ubuntu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  extract-and-unpack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Wine and Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y wine wine32 wine64 unrar p7zip-full

    - name: Download IPA file
      run: |
        curl -L -o app.ipa "https://github.com/Doann7457/tai-ipa/releases/download/jp.co.capcom.RE4US-6462360082-863325402/jp.co.capcom.RE4US-1.0.2-6462360082-863325402.ipa"

    - name: Extract IPA
      run: |
        mkdir -p extracted_ipa
        unzip app.ipa -d extracted_ipa/

    - name: Download and Extract FluffyQuack REtool
      run: |
        echo "Downloading compiled REtool..."
        curl -L -o REtool.rar "http://www.fluffyquack.com/tools/REtool.rar"
        
        echo "Extracting RAR package..."
        mkdir -p Utils
        7z x REtool.rar -oUtils -y
        
        if [ -f "Utils/retool.exe" ]; then
            echo "Success: retool.exe is ready."
        else
            echo "Failed to locate retool.exe after extraction."
            exit 1
        fi

- name: Download and Extract FluffyQuack REtool
      run: |
        echo "Downloading compiled REtool..."
        curl -L -o REtool.rar "http://www.fluffyquack.com/tools/REtool.rar"
        
        echo "Extracting RAR package..."
        mkdir -p Utils
        
        # Using unrar instead of 7z to prevent the segmentation fault
        unrar x -o+ REtool.rar Utils/
        
        if [ -f "Utils/retool.exe" ]; then
            echo "Success: retool.exe is ready."
        else
            echo "Failed to locate retool.exe after extraction."
            exit 1
        fi

    - name: Package and Save Extracted Assets
      uses: actions/upload-artifact@v4
      with:
        name: Extracted-RE4-Assets
        path: Extracted_Output/
        retention-days: 3
